<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYT Strands Generator</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f4f4f5; padding: 20px; color: #333; }
        .container { display: flex; gap: 40px; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1; min-width: 300px; }
        h2 { margin-top: 0; }
        
        .input-wrapper { display: flex; gap: 8px; margin-bottom: 10px; align-items: stretch; }
        input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; text-transform: uppercase; transition: background-color 0.3s;}
        
        .word-list { margin-bottom: 20px; }
        button { background: #4f46e5; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #4338ca; }
        button:disabled { background: #a5b4fc; cursor: not-allowed; }
        .secondary-btn { background: #10b981; margin-left: 10px; }
        .secondary-btn:hover { background: #059669; }
        .delete-btn { background: #ef4444; padding: 8px 12px; }
        .delete-btn:hover { background: #ff9ca3; }
        
        .counter { font-size: 1.2em; font-weight: bold; margin-bottom: 20px; }
        .valid { color: green; }
        .invalid { color: red; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .boards-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .board-wrapper { border: 2px solid #e5e7eb; padding: 10px; border-radius: 8px; transition: 0.2s; background: white;}
        .board-wrapper.selected { border-color: #4f46e5; background: #fafafa; }
        .grid { display: grid; grid-template-columns: repeat(6, 30px); gap: 2px; background: #e5e7eb; border: 2px solid #e5e7eb; cursor: pointer; }
        .cell { width: 30px; height: 30px; background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; transition: transform 0.1s;}
        
        /* Add a hover effect to words so users know they can click to flip them */
        .cell.clickable:hover { filter: brightness(0.85); transform: scale(1.05); z-index: 10; position: relative;}
        
        textarea { width: 100%; height: 300px; font-family: monospace; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-top: 20px; resize: vertical;}
        .hint-text { font-size: 0.9em; color: #6b7280; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>1. Inputs</h2>
        <label>Puzzle Title:</label>
        <div class="input-wrapper">
            <input type="text" id="puzzleTitle" placeholder="e.g., Table for two?" style="text-transform: none;">
        </div>
        
        <label>Spangram:</label>
        <div class="input-wrapper">
            <input type="text" class="word-input" id="spangram" placeholder="e.g., DININGOUT">
        </div>
        
        <div class="word-list" id="themeWordsList">
            <label>Theme Words:</label>
            </div>
        <button onclick="addWordInput()">+ Add Word</button>

        <div style="margin-top: 30px;">
            <div class="counter" id="letterCounter">Letters remaining: 48</div>
            <button id="generateBtn" onclick="generateBoards()" disabled>Scramble & Generate Boards</button>
        </div>
    </div>

    <div class="panel">
        <h2>2. Board Previews</h2>
        <div class="header-row">
            <p id="statusMsg">Fill out 48 letters to generate boards.</p>
            <button id="moreBoardsBtn" class="secondary-btn" style="display: none;" onclick="showNextBoards()">View Other Variations</button>
        </div>
        <span class="hint-text" id="flipHint" style="display: none;">💡 <strong>Pro Tip:</strong> Click any colored word on a board below to flip its direction!</span>
        <div class="boards-container" id="boardsArea"></div>

        <h2 style="margin-top: 30px;">3. Export Code</h2>
        <p>Click a board above to generate its copy-paste code.</p>
        <textarea id="outputCode" readonly placeholder="Your code will appear here..."></textarea>
    </div>
</div>

<script>
    // --- Rainbow Colors Palette ---
    const rainbowColors = [
        '#ffadad', '#ffd6a5', '#fdffb6', '#caffbf', '#9bf6ff', '#a0c4ff', '#bdb2ff', '#ffc6ff', '#e0e0e0'
    ];

    // --- UI Logic ---
    const list = document.getElementById('themeWordsList');
    const counter = document.getElementById('letterCounter');
    const generateBtn = document.getElementById('generateBtn');

    function updateInputColors() {
        const inputs = document.querySelectorAll('.word-input');
        inputs.forEach((input, index) => {
            const color = rainbowColors[index % rainbowColors.length];
            input.style.borderLeft = `6px solid ${color}`;
            input.style.backgroundColor = color + '40'; 
        });
    }

    function updateCount() {
        let count = 0;
        document.querySelectorAll('.word-input').forEach(input => {
            count += input.value.replace(/\s/g, '').length;
        });
        
        let remaining = 48 - count;
        counter.innerText = `Letters remaining: ${remaining}`;
        
        if (remaining === 0) {
            counter.className = 'counter valid';
            generateBtn.disabled = false;
        } else if (remaining < 0) {
            counter.className = 'counter invalid';
            generateBtn.disabled = true;
        } else {
            counter.className = 'counter';
            generateBtn.disabled = true;
        }
    }

    function addWordInput(value = "") {
        const wrapper = document.createElement('div');
        wrapper.className = 'input-wrapper';

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'word-input theme-word';
        input.placeholder = 'Next Word';
        input.value = value;
        input.addEventListener('input', updateCount);
        
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerText = '✖';
        delBtn.onclick = () => {
            wrapper.remove();
            updateCount();
            updateInputColors();
        };

        wrapper.appendChild(input);
        wrapper.appendChild(delBtn);
        list.appendChild(wrapper);
        updateInputColors(); 
    }

    // Initialize with 5 empty inputs
    for(let i=0; i<5; i++) addWordInput();

    document.addEventListener('input', (e) => {
        if(e.target.classList.contains('word-input')) updateCount();
    });

    // --- Upgraded Backtracking Algorithm ---
    const ROWS = 8, COLS = 6, N = 48;

    function getNeighbors(index) {
        const r = Math.floor(index / COLS);
        const c = index % COLS;
        const neighbors = [];
        for (let dr of [-1, 0, 1]) {
            for (let dc of [-1, 0, 1]) {
                if (dr === 0 && dc === 0) continue;
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                    neighbors.push(nr * COLS + nc);
                }
            }
        }
        return neighbors;
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function doesSpanBoard(path) {
        let hasTop = false, hasBottom = false, hasLeft = false, hasRight = false;
        for (let idx of path) {
            let r = Math.floor(idx / COLS);
            let c = idx % COLS;
            if (r === 0) hasTop = true;
            if (r === ROWS - 1) hasBottom = true;
            if (c === 0) hasLeft = true;
            if (c === COLS - 1) hasRight = true;
        }
        return (hasTop && hasBottom) || (hasLeft && hasRight);
    }

    function hasTrappedCell(used, prevPos) {
        const pr = Math.floor(prevPos / COLS);
        const pc = prevPos % COLS;
        for (let i = 0; i < N; i++) {
            if (!used[i]) {
                const r = Math.floor(i / COLS);
                const c = i % COLS;
                if (Math.abs(r - pr) <= 1 && Math.abs(c - pc) <= 1) continue;
                let hasEmptyNeighbor = false;
                for (let dr of [-1, 0, 1]) {
                    for (let dc of [-1, 0, 1]) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                            if (!used[nr * COLS + nc]) {
                                hasEmptyNeighbor = true;
                                break;
                            }
                        }
                    }
                    if (hasEmptyNeighbor) break;
                }
                if (!hasEmptyNeighbor) return true; 
            }
        }
        return false;
    }

    class GridSolver {
        constructor(words) {
            this.wordObjects = words.map((w, idx) => ({
                originalIdx: idx,
                word: w.replace(/\s/g, '').toUpperCase(),
                isSpangram: idx === 0
            }));
            this.wordObjects.sort((a, b) => b.word.length - a.word.length);
            this.results = [];
            this.maxResults = 50; 
        }

        solveWithRestarts(maxRestarts = 2000, maxItersPerRestart = 4000) {
            for (let attempt = 0; attempt < maxRestarts; attempt++) {
                let iterations = 0;
                let foundPath = null;

                const dfs = (wordIdx, charIdx, currentPath, used, completedPaths) => {
                    if (foundPath || iterations > maxItersPerRestart) return;
                    iterations++;

                    if (wordIdx === this.wordObjects.length) {
                        foundPath = completedPaths.map(p => [...p]);
                        return;
                    }

                    const wordObj = this.wordObjects[wordIdx];
                    const word = wordObj.word;

                    if (charIdx === word.length) {
                        if (wordObj.isSpangram && !doesSpanBoard(currentPath)) return; 
                        completedPaths.push([...currentPath]);
                        dfs(wordIdx + 1, 0, [], used, completedPaths);
                        completedPaths.pop();
                        return;
                    }

                    if (charIdx === 0) {
                        let available = [];
                        for (let i = 0; i < N; i++) if (!used[i]) available.push(i);
                        shuffleArray(available);

                        for (let startPos of available) {
                            used[startPos] = true;
                            currentPath.push(startPos);
                            dfs(wordIdx, 1, currentPath, used, completedPaths);
                            currentPath.pop();
                            used[startPos] = false;
                            if (foundPath) return;
                        }
                    } else {
                        const prevPos = currentPath[currentPath.length - 1];
                        if (hasTrappedCell(used, prevPos)) return;

                        let neighbors = getNeighbors(prevPos);
                        shuffleArray(neighbors);

                        for (let n of neighbors) {
                            if (!used[n]) {
                                used[n] = true;
                                currentPath.push(n);
                                dfs(wordIdx, charIdx + 1, currentPath, used, completedPaths);
                                currentPath.pop();
                                used[n] = false;
                                if (foundPath) return;
                            }
                        }
                    }
                };
                dfs(0, 0, [], new Array(N).fill(false), []);

                if (foundPath) {
                    let formattedResult = new Array(this.wordObjects.length);
                    for (let j = 0; j < this.wordObjects.length; j++) {
                        formattedResult[this.wordObjects[j].originalIdx] = foundPath[j];
                    }
                    const resString = JSON.stringify(formattedResult);
                    if (!this.results.some(r => JSON.stringify(r) === resString)) {
                        this.results.push(formattedResult);
                    }
                    if (this.results.length >= this.maxResults) break;
                }
            }
        }
    }

    // --- State & Rendering Logic ---
    let globalBoards = [];
    let currentBoardIndex = 0;
    let currentAllWords = [];

    async function generateBoards() {
        const spangram = document.getElementById('spangram').value;
        const themeWords = Array.from(document.querySelectorAll('.theme-word'))
                                .map(i => i.value)
                                .filter(v => v.trim() !== "");

        const statusMsg = document.getElementById('statusMsg');
        const btn = document.getElementById('moreBoardsBtn');
        const hint = document.getElementById('flipHint');
        
        statusMsg.innerText = "Applying NYT rules & crunching variations... please wait.";
        document.getElementById('boardsArea').innerHTML = '';
        document.getElementById('outputCode').value = '';
        btn.style.display = 'none';
        hint.style.display = 'none';

        setTimeout(() => {
            currentAllWords = [spangram, ...themeWords];
            const solver = new GridSolver(currentAllWords);
            
            solver.solveWithRestarts();

            if (solver.results.length === 0) {
                statusMsg.innerText = "Could not find a grid matching all rules. Try modifying word order or lengths.";
                return;
            }

            globalBoards = solver.results.map(paths => {
                const boardData = { letters: new Array(48).fill(""), themeWords: [] };
                paths.forEach((path, i) => {
                    const wordStr = currentAllWords[i].replace(/\s/g, '').toUpperCase();
                    path.forEach((gridIdx, charIdx) => {
                        boardData.letters[gridIdx] = wordStr[charIdx];
                    });
                    boardData.themeWords.push({
                        id: i,
                        word: wordStr,
                        path: path,
                        spangram: (i === 0)
                    });
                });
                return boardData;
            });

            currentBoardIndex = 0;
            renderCurrentPage();

        }, 50);
    }

    function renderCurrentPage() {
        const area = document.getElementById('boardsArea');
        const statusMsg = document.getElementById('statusMsg');
        const btn = document.getElementById('moreBoardsBtn');
        const hint = document.getElementById('flipHint');
        
        area.innerHTML = '';
        document.getElementById('outputCode').value = '';

        const boardsToShow = globalBoards.slice(currentBoardIndex, currentBoardIndex + 5);
        boardsToShow.forEach(board => renderBoard(board, area));

        let endIdx = Math.min(currentBoardIndex + 5, globalBoards.length);
        statusMsg.innerText = `Showing ${currentBoardIndex + 1}-${endIdx} of ${globalBoards.length} found valid variations.`;
        
        if (globalBoards.length > 0) hint.style.display = 'block';
        if (globalBoards.length > 5) btn.style.display = 'inline-block';
    }

    function showNextBoards() {
        currentBoardIndex += 5;
        if (currentBoardIndex >= globalBoards.length) currentBoardIndex = 0;
        renderCurrentPage();
    }

    function renderBoard(board, container) {
        const wrapper = document.createElement('div');
        wrapper.className = 'board-wrapper';
        
        // Base click for selecting the board
        wrapper.onclick = () => selectBoard(wrapper, board);
        
        const cellColors = new Array(48).fill('');
        board.themeWords.forEach((tw, idx) => {
            const color = rainbowColors[idx % rainbowColors.length];
            tw.path.forEach(gridIdx => {
                cellColors[gridIdx] = color;
            });
        });

        const grid = document.createElement('div');
        grid.className = 'grid';
        
        board.letters.forEach((letter, i) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = letter;
            
            if (cellColors[i]) {
                cell.style.backgroundColor = cellColors[i];
                cell.classList.add('clickable');
                
                // Add click event to flip the word
                cell.onclick = (e) => {
                    e.stopPropagation(); // Prevent duplicate wrapper click events
                    flipWord(board, i, wrapper);
                };
            }
            grid.appendChild(cell);
        });
        
        wrapper.appendChild(grid);
        container.appendChild(wrapper);
    }

    function flipWord(board, cellIndex, wrapper) {
        // Find which word was clicked
        let targetWord = board.themeWords.find(tw => tw.path.includes(cellIndex));
        if (!targetWord) return;

        // Reverse its path
        targetWord.path.reverse();

        // Reassign the characters to the newly reversed path
        targetWord.path.forEach((gridIdx, charIdx) => {
            board.letters[gridIdx] = targetWord.word[charIdx];
        });

        // Visually update the letters in the UI
        const cells = wrapper.querySelectorAll('.cell');
        board.letters.forEach((letter, i) => {
            cells[i].innerText = letter;
        });

        // Automatically select the board and update the output code to reflect the change
        selectBoard(wrapper, board);
    }

    function selectBoard(wrapperElement, board) {
        const currentPuzzleTitle = document.getElementById('puzzleTitle').value || "Untitled";
        const dateStr = new Date().toISOString().split('T')[0];
        
        let out = `    "${dateStr}": {\n`;
        out += `        "title": "${currentPuzzleTitle}",\n`;
        out += `        "letters": [\n`;
        
        for (let i = 0; i < board.letters.length; i+=6) {
            let row = board.letters.slice(i, i+6).map(l => `"${l}"`).join(', ');
            out += `            ${row}${i < 42 ? ',' : ''}\n`;
        }
        out += `        ],\n`;
        out += `        "themeWords": [\n`;
        
        board.themeWords.forEach((tw, idx) => {
            const isLast = idx === board.themeWords.length - 1;
            out += `            { \n                "id": ${tw.id}, \n                "word": "${tw.word}", \n                "path": [${tw.path.join(', ')}], \n                "spangram": ${tw.spangram} \n            }${isLast ? '' : ','}\n`;
        });
        
        out += `        ]\n    }`;

        document.getElementById('outputCode').value = out;
        
        // Highlight active board
        document.querySelectorAll('.board-wrapper').forEach(w => w.classList.remove('selected'));
        wrapperElement.classList.add('selected');
    }
</script>
</body>
</html>
